name: 抖音自动续火花
on:
  workflow_dispatch: # 允许手动触发
  schedule: # 定时任务
    - cron: "45 4 * * *" # 每天 4:30 UTC（对应北京时间 12:30）
jobs:
  run-main:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    environment: user-data
    steps:
    - uses: actions/checkout@v4
    - name: 安装python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: 测试抖音访问
      run: |
        curl -I https://creator.douyin.com/
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: 确保浏览器已安装
      run: playwright install chromium --with-deps --only-shell
    - name: 导出Github环境变量和密钥到JSON
      env:
        VARS_JSON: ${{ toJson(vars) }}
        SECRETS_JSON: ${{ toJson(secrets) }}
      run: python utils/export_github_env.py
    - name: 运行抖音火花流
      run: python main.py
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: run-logs
        path: logs/
  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1
